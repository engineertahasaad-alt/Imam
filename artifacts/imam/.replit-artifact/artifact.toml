kind = "mobile"
previewPath = "/"
title = "Imam"
version = "1.0.0"
id = "artifacts/salah-guardian"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25111

[services.development]
run = "pnpm --filter @workspace/imam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imam", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/imam", "run", "serve" ]

[services.env]
PORT = "25111"
BASE_PATH = "/"
